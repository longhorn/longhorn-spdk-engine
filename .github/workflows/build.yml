name: build
on:
  push:
    branches:
    - master
    - v*
    tags:
    - v*
  pull_request:
  workflow_dispatch:
jobs:
  build-amd64:
    name: Build AMD64 binaries
    runs-on: longhorn-infra-oracle-amd64-spdk-runners
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install make curl git kmod
      run: |
        sudo apt update
        sudo apt-get -y install make curl git kmod
    # Build binaries
    - name: Run ci
      run: make ci

    - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      with:
        files: ./coverage.out
        flags: unittests
        token: ${{ secrets.CODECOV_TOKEN }}

  build-arm64:
    name: Build ARM64 binaries
    runs-on: longhorn-infra-oracle-arm64-spdk-runners
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install make curl git kmod
      run: |
        sudo apt update
        sudo apt-get -y install make curl git kmod
    # Build binaries
    - name: Run ci
      run: sudo make ci

    - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      with:
        files: ./coverage.out
        flags: unittests
        token: ${{ secrets.CODECOV_TOKEN }}
